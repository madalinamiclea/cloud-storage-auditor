# =============================================================================
# Cloud Storage Auditor — CIS Benchmark Mappings
# =============================================================================
# Maps each security check to the corresponding CIS Foundation Benchmark
# control(s) for AWS, Azure and GCP.
#
# References:
#   - CIS Amazon Web Services Foundations Benchmark v3.0.0
#   - CIS Microsoft Azure Foundations Benchmark v2.1.0
#   - CIS Google Cloud Platform Foundation Benchmark v2.0.0
# =============================================================================

checks:

  public_access_block:
    aws:
      cis_id: "2.1.5"
      control: "Ensure that S3 Buckets are configured with Block Public Access"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "3.7"
      control: "Ensure that public access level is disabled for storage accounts"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "5.1"
      control: "Ensure that Cloud Storage bucket is not anonymously or publicly accessible"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"

  iam_policy_least_privilege:
    aws:
      cis_id: "1.16"
      control: "Ensure IAM policies that allow full administrative privileges are not attached"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "1.23"
      control: "Ensure that no custom subscription administrator roles are created"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "1.6"
      control: "Ensure that IAM users are not assigned the Service Account User or Admin role at project level"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"

  acl_not_public:
    aws:
      cis_id: "2.1.5"
      control: "Ensure that S3 Buckets are configured with Block Public Access (ACL component)"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "3.7"
      control: "Ensure that public access level is disabled for storage accounts (container ACLs)"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "5.2"
      control: "Ensure that Cloud Storage buckets have uniform bucket-level access enabled"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"

  encryption_at_rest:
    aws:
      cis_id: "2.1.1"
      control: "Ensure S3 Bucket Policy is set to deny HTTP requests"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
      note: "AWS encrypts S3 objects by default with SSE-S3 since Jan 2023. Check verifies SSE-KMS or CMK usage."
    azure:
      cis_id: "3.2"
      control: "Ensure that storage account access keys are periodically regenerated (encryption context)"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
      note: "Azure encrypts all blob data by default. Check verifies CMK usage for enhanced control."
    gcp:
      cis_id: "5.3"
      control: "Ensure that Cloud Storage buckets have CMEK encryption enabled"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"

  encryption_in_transit:
    aws:
      cis_id: "2.1.2"
      control: "Ensure S3 Bucket Policy is set to deny HTTP requests"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "3.1"
      control: "Ensure that Secure transfer required is set to Enabled"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "N/A"
      control: "GCP Cloud Storage enforces TLS for all API calls by default"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"
      note: "No explicit CIS control because GCP enforces HTTPS at the API level."

  access_logging:
    aws:
      cis_id: "2.1.3"
      control: "Ensure S3 bucket access logging is enabled on the S3 bucket"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "3.10"
      control: "Ensure Storage logging is enabled for Blob service"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "2.11"
      control: "Ensure that Cloud Audit Logging is configured properly across all services"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"

  audit_trail:
    aws:
      cis_id: "3.1"
      control: "Ensure CloudTrail is enabled in all regions"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "5.1.2"
      control: "Ensure Diagnostic Setting captures appropriate categories"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "2.1"
      control: "Ensure that Cloud Audit Logging is configured properly"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"

  versioning_enabled:
    aws:
      cis_id: "2.1.3"
      control: "Ensure S3 bucket versioning is enabled"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "3.12"
      control: "Ensure soft delete is enabled for Azure Storage Blobs"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
      note: "Azure Blob versioning is a separate feature from soft delete."
    gcp:
      cis_id: "5.1"
      control: "Cloud Storage bucket object versioning"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"
      note: "Not a dedicated CIS control; recommended as best practice."

  soft_delete_or_mfa_delete:
    aws:
      cis_id: "2.1.3"
      control: "Ensure MFA Delete is enabled on S3 buckets"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "3.12"
      control: "Ensure soft delete is enabled for Azure Storage Blobs"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "N/A"
      control: "Ensure Object Versioning or retention policies are configured"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"
      note: "GCP uses retention policies and Object Lock rather than soft delete."

  lifecycle_policy:
    aws:
      cis_id: "N/A"
      control: "Lifecycle configuration for S3 buckets"
      benchmark: "Best practice — not a specific CIS control"
    azure:
      cis_id: "N/A"
      control: "Lifecycle management for Azure Blob Storage"
      benchmark: "Best practice — not a specific CIS control"
    gcp:
      cis_id: "N/A"
      control: "Lifecycle rules for Cloud Storage buckets"
      benchmark: "Best practice — not a specific CIS control"

  no_public_objects:
    aws:
      cis_id: "2.1.5"
      control: "Ensure that S3 Buckets are configured with Block Public Access (object-level)"
      benchmark: "CIS AWS Foundations Benchmark v3.0.0"
    azure:
      cis_id: "3.7"
      control: "Ensure that public access level is disabled (blob-level)"
      benchmark: "CIS Microsoft Azure Foundations Benchmark v2.1.0"
    gcp:
      cis_id: "5.1"
      control: "Ensure that Cloud Storage bucket is not publicly accessible (object-level)"
      benchmark: "CIS Google Cloud Platform Foundation Benchmark v2.0.0"

  cors_restrictive:
    aws:
      cis_id: "N/A"
      control: "Ensure S3 bucket CORS policy does not allow wildcard origins"
      benchmark: "Best practice — OWASP Cross-Origin Resource Sharing"
    azure:
      cis_id: "N/A"
      control: "Ensure Blob Storage CORS rules do not allow wildcard origins"
      benchmark: "Best practice — OWASP Cross-Origin Resource Sharing"
    gcp:
      cis_id: "N/A"
      control: "Ensure Cloud Storage CORS configuration does not allow wildcard origins"
      benchmark: "Best practice — OWASP Cross-Origin Resource Sharing"
